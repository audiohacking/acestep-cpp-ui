name: Electron Release

# Triggered by a new semver tag push or a manual dispatch with an explicit tag.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.0.0)"
        required: true
        default: "v0.0.1-electron"
      binary_version:
        description: "acestep.cpp release tag to bundle (e.g. v0.0.1)"
        required: false
        default: "v0.0.1"

concurrency:
  group: electron-release-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  # Default acestep.cpp binary release to bundle.  Can be overridden per-run
  # via the workflow_dispatch input above.
  BINARY_VERSION: ${{ github.event.inputs.binary_version || 'v0.0.1' }}

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # Per-platform Electron build
  #
  # Both archives are FLAT tarballs: every file sits directly at "./" with no
  # subdirectory.  Extracting with "tar -xzf archive.tar.gz -C bin/" places
  # everything (binaries AND shared libraries) straight into bin/.
  #
  # Linux:  The archive ships binaries (ace-qwen3, dit-vae, …) AND shared
  #         libraries (libggml*.so, libggml-base*.so, etc.).  The ELFs have a
  #         hardcoded RUNPATH pointing to the CI build tree; LD_LIBRARY_PATH
  #         must be set at runtime to override it (done in electron/main.js).
  #         The archive ships unversioned names (libggml.so) while the ELFs
  #         link against versioned sonames (libggml.so.0) — we create those
  #         symlinks in CI and again at runtime as a fallback.
  #
  # macOS:  The archive ships binaries AND versioned dylibs:
  #           libggml.0.9.7.dylib  (real file)
  #           libggml.0.dylib      (symlink → libggml.0.9.7.dylib)
  #           libggml.dylib        (symlink → libggml.0.dylib)
  #         … and the same two-level chain for libggml-base, libggml-metal,
  #         libggml-cpu, and libggml-blas.
  #         DYLD_LIBRARY_PATH is set to BIN_DIR at runtime (electron/main.js)
  #         so dyld finds them regardless of the install names baked in at
  #         compile time.  The symlink chain is also recreated at runtime
  #         (fixMacosDylibLinks) in case electron-builder loses the symlinks.
  # ────────────────────────────────────────────────────────────────────────────
  build:
    name: Electron — ${{ matrix.os-label }}
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS Apple Silicon → .dmg
          - runner: macos-14
            os-label: macOS-arm64
            platform_flag: --mac
            binary_archive: acestep-macos-arm64-metal.tar.gz

          # Linux x86_64 → .AppImage + .deb
          - runner: ubuntu-22.04
            os-label: Linux-x64
            platform_flag: --linux
            binary_archive: acestep-linux-x64.tar.gz

    steps:
      - uses: actions/checkout@v4

      # ── Node setup ──────────────────────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      # ── Install dependencies ────────────────────────────────────────────────
      - name: Install root dependencies
        run: npm ci

      - name: Install server dependencies
        run: npm ci
        working-directory: server

      # ── Build frontend (Vite → dist/) ───────────────────────────────────────
      - name: Build frontend
        run: npm run build

      # ── Build server (TypeScript → server/dist/) ────────────────────────────
      - name: Build server
        run: npm run build
        working-directory: server

      # ── Download & extract precompiled acestep.cpp binaries ─────────────────
      #
      # Both archives are FLAT tarballs: every file sits directly at "./"
      # with no subdirectory.  Extracting with "-C bin/" places everything
      # (binaries AND shared libraries) straight into bin/.
      #
      # The "./" prefix in the archive is equivalent to the extraction target,
      # so "tar -xzf archive.tar.gz -C bin/" is the correct command.
      # "--strip-components" must NOT be used: it would strip the "./" and
      # attempt to extract into bin/ itself which is fine, but we keep the
      # command simple and explicit.
      - name: Download & extract acestep.cpp binaries
        shell: bash
        run: |
          mkdir -p bin
          BINARY_URL="https://github.com/audiohacking/acestep.cpp/releases/download/${BINARY_VERSION}/${{ matrix.binary_archive }}"

          echo "Downloading ${{ matrix.binary_archive }} from ${BINARY_URL} …"
          curl -fsSL --retry 3 \
            "${BINARY_URL}" \
            -o '${{ matrix.binary_archive }}'

          echo "Archive contents:"
          tar -tzf '${{ matrix.binary_archive }}' | head -40

          echo ""
          echo "Extracting into bin/ …"
          tar -xzf '${{ matrix.binary_archive }}' -C bin/

          echo ""
          echo "bin/ after extraction:"
          ls -lh bin/

      # ── Create versioned soname symlinks (Linux only) ───────────────────────
      #
      # The Linux ELFs link against libggml.so.0 / libggml-base.so.0 (sonames)
      # but the archive ships libggml.so / libggml-base.so (unversioned names).
      # Without the symlinks the dynamic linker cannot resolve the libraries.
      # These symlinks are created here before packaging so that electron-builder
      # can include them in extraResources.  The Electron main process also
      # creates them at runtime as a fallback (e.g. during development).
      - name: Create soname symlinks (Linux)
        if: matrix.os-label == 'Linux-x64'
        shell: bash
        run: |
          cd bin
          for pair in "libggml.so:libggml.so.0" "libggml-base.so:libggml-base.so.0"; do
            real="${pair%%:*}"
            soname="${pair##*:}"
            if [ -f "$real" ] && [ ! -e "$soname" ]; then
              ln -sv "$real" "$soname"
            fi
          done
          echo "Symlinks in bin/:"
          ls -la | grep " -> " || echo "(none)"

      # ── Verify key binaries and libraries are present ───────────────────────
      - name: Verify binaries
        shell: bash
        run: |
          warn=0
          for bin in ace-qwen3 dit-vae neural-codec; do
            if [ -f "bin/$bin" ] && [ -x "bin/$bin" ]; then
              echo "✅  bin/$bin"
            else
              echo "⚠️  bin/$bin — not found or not executable"
              warn=1
            fi
          done

          # Linux: check that all required .so files and versioned soname
          # symlinks are present in bin/ alongside the binaries.
          if [ '${{ matrix.os-label }}' = 'Linux-x64' ]; then
            for lib in libggml.so libggml-base.so libggml.so.0 libggml-base.so.0; do
              if [ -e "bin/$lib" ]; then
                echo "✅  bin/$lib"
              else
                echo "⚠️  bin/$lib — missing"
                warn=1
              fi
            done
          fi

          # macOS: check that the real versioned dylibs are present, plus the
          # two-level symlink chain (.0.dylib and .dylib) for each library.
          # GGML_VER matches the version shipped in the v0.0.1 archive.
          if [ '${{ matrix.os-label }}' = 'macOS-arm64' ]; then
            GGML_VER="0.9.7"
            for lib_base in libggml libggml-base libggml-metal libggml-cpu libggml-blas; do
              for lib_name in "${lib_base}.${GGML_VER}.dylib" "${lib_base}.0.dylib" "${lib_base}.dylib"; do
                if [ -e "bin/${lib_name}" ]; then
                  echo "✅  bin/${lib_name}"
                else
                  echo "⚠️  bin/${lib_name} — missing"
                  warn=1
                fi
              done
            done
          fi

          if [ "$warn" = "1" ]; then
            echo ""
            echo "⚠️  One or more expected files are missing — the packaged app may not work correctly."
            echo "    Verify that BINARY_VERSION=${BINARY_VERSION} points to the correct release."
          fi

      # ── Rebuild better-sqlite3 for Electron's Node.js ──────────────────────
      - name: Rebuild native modules for Electron
        run: npx @electron/rebuild --module-dir server --only better-sqlite3

      # ── Package with electron-builder ───────────────────────────────────────
      - name: Build Electron package
        run: npm run electron:build -- ${{ matrix.platform_flag }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false   # skip code-signing in CI

      # ── Collect and upload artifacts ─────────────────────────────────────────
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: electron-${{ matrix.os-label }}
          path: |
            release/**/*.dmg
            release/**/*.AppImage
            release/**/*.deb
            release/**/*.tar.gz
            release/**/*.zip
          if-no-files-found: warn
          retention-days: 7

  # ────────────────────────────────────────────────────────────────────────────
  # Publish a GitHub Release with all platform artifacts attached.
  # ────────────────────────────────────────────────────────────────────────────
  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          pattern: electron-*
          path: release-artifacts
          merge-multiple: true

      - name: List release artifacts
        run: find release-artifacts -type f | sort

      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME:-}"
          [[ "$TAG" == v* ]] || TAG="${{ github.event.inputs.tag || 'v0.0.1-electron' }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "ACE-Step UI ${{ steps.tag.outputs.tag }} — Desktop App"
          draft: false
          prerelease: ${{ contains(steps.tag.outputs.tag, '-') }}
          body: |
            ## ACE-Step UI ${{ steps.tag.outputs.tag }} — Electron Desktop App

            Native desktop application with embedded server and precompiled
            [acestep.cpp](https://github.com/audiohacking/acestep.cpp) binaries bundled — no compiler or build step required.

            ### Downloads

            | File | Platform |
            |------|----------|
            | `*.dmg`      | macOS — Apple Silicon (arm64) |
            | `*.AppImage` | Linux — x86_64 (any distro, single executable) |
            | `*.deb`      | Linux — x86_64 (Debian / Ubuntu) |

            ### First run

            On first launch the app will offer to download the default Q8_0 model set
            (~8 GB total) from HuggingFace automatically.  You can also skip and
            copy models manually to:
            - **macOS** `~/Library/Application Support/ACE-Step UI/models/`
            - **Linux** `~/.config/ACE-Step UI/models/`

            Generated audio is saved to `~/Music/ACEStep/`.

            ### Linux notes

            The AppImage bundles the GGML shared libraries alongside the binaries.
            If you see *"libggml.so.0: cannot open shared object file"* errors,
            ensure the AppImage has execute permission (`chmod +x *.AppImage`).
          files: release-artifacts/**/*
          fail_on_unmatched_files: false
