name: Electron Release

# Triggered by a new semver tag push or a manual dispatch with an explicit tag.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.0.0)"
        required: true
        default: "v0.0.1-electron"

concurrency:
  group: electron-release-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # Per-platform Electron build
  #
  # Linux:  The precompiled archive is a FLAT tarball — all binaries (.ace-qwen3,
  #         .dit-vae, …) AND shared libraries (libggml*.so) live at the root
  #         with a "./" prefix.  They are extracted together into bin/ so that
  #         the loader finds them in the same directory at runtime.
  #         The ELFs link against versioned sonames (libggml.so.0) but the
  #         archive ships the unversioned names (libggml.so) — we create the
  #         required symlinks after extraction.
  #
  # macOS:  Also a flat tarball.  The Metal-compiled binaries may depend on
  #         system frameworks; DYLD_LIBRARY_PATH is set at runtime in main.js
  #         as a safety net.
  # ────────────────────────────────────────────────────────────────────────────
  build:
    name: Electron — ${{ matrix.os-label }}
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS Apple Silicon → .dmg
          - runner: macos-14
            os-label: macOS-arm64
            platform_flag: --mac
            binary_url: https://github.com/audiohacking/acestep.cpp/releases/download/v0.0.1/acestep-macos-arm64-metal.tar.gz
            binary_archive: acestep-macos-arm64-metal.tar.gz

          # Linux x86_64 → .AppImage + .deb
          - runner: ubuntu-22.04
            os-label: Linux-x64
            platform_flag: --linux
            binary_url: https://github.com/audiohacking/acestep.cpp/releases/download/v0.0.1/acestep-linux-x64.tar.gz
            binary_archive: acestep-linux-x64.tar.gz

    steps:
      - uses: actions/checkout@v4

      # ── Node setup ──────────────────────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      # ── Install dependencies ────────────────────────────────────────────────
      - name: Install root dependencies
        run: npm ci

      - name: Install server dependencies
        run: npm ci
        working-directory: server

      # ── Build frontend (Vite → dist/) ───────────────────────────────────────
      - name: Build frontend
        run: npm run build

      # ── Build server (TypeScript → server/dist/) ────────────────────────────
      - name: Build server
        run: npm run build
        working-directory: server

      # ── Download & extract precompiled acestep.cpp binaries ─────────────────
      #
      # Both archives are FLAT tarballs: every file sits directly at "./"
      # with no subdirectory.  Extracting with "-C bin/" places everything
      # (binaries AND shared libraries) straight into bin/.
      #
      # The "./" prefix in the archive is equivalent to the extraction target,
      # so "tar -xzf archive.tar.gz -C bin/" is the correct command.
      # "--strip-components" must NOT be used: it would strip the "./" and
      # attempt to extract into bin/ itself which is fine, but we keep the
      # command simple and explicit.
      - name: Download & extract acestep.cpp binaries
        shell: bash
        run: |
          mkdir -p bin

          echo "Downloading ${{ matrix.binary_archive }} …"
          curl -fsSL --retry 3 \
            '${{ matrix.binary_url }}' \
            -o '${{ matrix.binary_archive }}'

          echo "Archive contents:"
          tar -tzf '${{ matrix.binary_archive }}' | head -40

          echo ""
          echo "Extracting into bin/ …"
          tar -xzf '${{ matrix.binary_archive }}' -C bin/

          echo ""
          echo "bin/ after extraction:"
          ls -lh bin/

      # ── Create versioned soname symlinks (Linux only) ───────────────────────
      #
      # The Linux ELFs link against libggml.so.0 / libggml-base.so.0 (sonames)
      # but the archive ships libggml.so / libggml-base.so (unversioned names).
      # Without the symlinks the dynamic linker cannot resolve the libraries.
      # These symlinks are created here before packaging so that electron-builder
      # can include them in extraResources.  The Electron main process also
      # creates them at runtime as a fallback (e.g. during development).
      - name: Create soname symlinks (Linux)
        if: matrix.os-label == 'Linux-x64'
        shell: bash
        run: |
          cd bin
          for pair in "libggml.so:libggml.so.0" "libggml-base.so:libggml-base.so.0"; do
            real="${pair%%:*}"
            soname="${pair##*:}"
            if [ -f "$real" ] && [ ! -e "$soname" ]; then
              ln -sv "$real" "$soname"
            fi
          done
          echo "Symlinks in bin/:"
          ls -la | grep " -> " || echo "(none)"

      # ── Verify key binaries are executable ──────────────────────────────────
      - name: Verify binaries
        shell: bash
        run: |
          ok=1
          for bin in ace-qwen3 dit-vae neural-codec; do
            if [ -f "bin/$bin" ] && [ -x "bin/$bin" ]; then
              echo "✅  bin/$bin"
            else
              echo "⚠️  bin/$bin — not found or not executable"
              ok=0
            fi
          done
          # Also check that the shared libs are present on Linux
          if [ '${{ matrix.os-label }}' = 'Linux-x64' ]; then
            for lib in libggml.so libggml-base.so libggml.so.0 libggml-base.so.0; do
              if [ -e "bin/$lib" ]; then
                echo "✅  bin/$lib"
              else
                echo "⚠️  bin/$lib — missing"
                ok=0
              fi
            done
          fi
          [ "$ok" = "1" ] || { echo ""; echo "One or more required files are missing — aborting."; exit 1; }

      # ── Rebuild better-sqlite3 for Electron's Node.js ──────────────────────
      - name: Rebuild native modules for Electron
        run: npx @electron/rebuild --module-dir server --only better-sqlite3

      # ── Package with electron-builder ───────────────────────────────────────
      - name: Build Electron package
        run: npm run electron:build -- ${{ matrix.platform_flag }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false   # skip code-signing in CI
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Collect and upload artifacts ─────────────────────────────────────────
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: electron-${{ matrix.os-label }}
          path: |
            release/**/*.dmg
            release/**/*.AppImage
            release/**/*.deb
          if-no-files-found: warn
          retention-days: 7

  # ────────────────────────────────────────────────────────────────────────────
  # Publish a GitHub Release with all platform artifacts attached.
  # ────────────────────────────────────────────────────────────────────────────
  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          pattern: electron-*
          path: release-artifacts
          merge-multiple: true

      - name: List release artifacts
        run: find release-artifacts -type f | sort

      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME:-}"
          [[ "$TAG" == v* ]] || TAG="${{ github.event.inputs.tag || 'v0.0.1-electron' }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "ACE-Step UI ${{ steps.tag.outputs.tag }} — Desktop App"
          draft: false
          prerelease: ${{ contains(steps.tag.outputs.tag, '-') }}
          body: |
            ## ACE-Step UI ${{ steps.tag.outputs.tag }} — Electron Desktop App

            Native desktop application with embedded server and precompiled
            [acestep.cpp](https://github.com/audiohacking/acestep.cpp) binaries bundled — no compiler or build step required.

            ### Downloads

            | File | Platform |
            |------|----------|
            | `*.dmg`      | macOS — Apple Silicon (arm64) |
            | `*.AppImage` | Linux — x86_64 (any distro, single executable) |
            | `*.deb`      | Linux — x86_64 (Debian / Ubuntu) |

            ### First run

            On first launch the app will offer to download the default Q8_0 model set
            (~8 GB total) from HuggingFace automatically.  You can also skip and
            copy models manually to:
            - **macOS** `~/Library/Application Support/ACE-Step UI/models/`
            - **Linux** `~/.config/ACE-Step UI/models/`

            Generated audio is saved to `~/Music/ACEStep/`.

            ### Linux notes

            The AppImage bundles the GGML shared libraries alongside the binaries.
            If you see *"libggml.so.0: cannot open shared object file"* errors,
            ensure the AppImage has execute permission (`chmod +x *.AppImage`).
          files: release-artifacts/**/*
          fail_on_unmatched_files: false
