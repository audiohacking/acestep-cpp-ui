jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve release tag
        id: resolve_release
        run: |
          echo "::set-output name=tag::$(echo ${GITHUB_REF#refs/tags/})"
      - name: Check if Release Exists
        id: release_check
        run: |
          if gh release view "${{ steps.resolve_release.outputs.tag }}"; then
            echo "Release exists."
            echo "::set-output name=exists::true"
          else
            echo "Release does not exist."
            echo "::set-output name=exists::false"
          fi
      - name: Create Release if missing
        if: steps.release_check.outputs.exists != 'true'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.resolve_release.outputs.tag }}
          draft: false
          prerelease: false
          body: 'Release for ${{ steps.resolve_release.outputs.tag }}'
          name: 'Release ${{ steps.resolve_release.outputs.tag }}'
      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.resolve_release.outputs.tag }}
          append_body: false
          fail_on_unmatched_files: false
          draft: ${{ steps.release_check.outputs.exists == 'true' }}
          prerelease: ${{ steps.release_check.outputs.exists == 'true' }}
